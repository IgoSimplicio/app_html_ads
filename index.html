<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audio Auto Cut</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f5f5f5;
        }
        
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .content {
            flex: 1;
            width: 100%;
            position: relative;
        }
        
        #mainIframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: white;
        }
        
        /* Placeholder para o banner nativo */
        .banner-placeholder {
            width: 100%;
            height: 60px;
            background-color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 14px;
            border-top: 1px solid #ccc;
            display: none;
        }
        
        .banner-placeholder.active {
            display: flex;
        }
        
        .banner-placeholder.ad-loaded {
            background-color: transparent;
            height: auto;
            min-height: 50px;
            color: transparent;
        }
        
        /* Interface de controle */
        .control-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background-color: rgba(0,0,0,0.7);
            border-radius: 30px;
            padding: 5px;
            display: flex;
            gap: 5px;
        }
        
        .control-btn {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background-color: white;
            border: none;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .control-btn:hover {
            background-color: #f0f0f0;
        }
        
        .debug-info {
            position: fixed;
            bottom: 80px;
            left: 10px;
            right: 10px;
            background-color: rgba(0,0,0,0.8);
            color: #00ff00;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            z-index: 2000;
            display: none;
        }
        
        .debug-info.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Painel de controle -->
        <div class="control-panel" id="controlPanel">
            <button class="control-btn" onclick="loadConfig()" title="Recarregar Configuração">🔄</button>
            <button class="control-btn" onclick="toggleDebug()" title="Debug">🐞</button>
            <button class="control-btn" onclick="sendToNative('refresh')" title="Atualizar Banner">📱</button>
        </div>
        
        <!-- Conteúdo principal (iframe) -->
        <div class="content" id="contentArea">
            <iframe id="mainIframe" src="about:blank"></iframe>
        </div>
        
        <!-- Placeholder para o banner nativo -->
        <div class="banner-placeholder" id="bannerPlaceholder">
            <span>Carregando anúncio...</span>
        </div>
        
        <!-- Informações de debug -->
        <div class="debug-info" id="debugInfo">
            <div id="debugContent"></div>
        </div>
    </div>
    
    <script>
        // Configuração
        const GITHUB_CONFIG_URL = 'https://raw.githubusercontent.com/IgoSimplicio/app_html_ads/main/config.json';
        
        // Elementos DOM
        const iframe = document.getElementById('mainIframe');
        const bannerPlaceholder = document.getElementById('bannerPlaceholder');
        const debugInfo = document.getElementById('debugInfo');
        const debugContent = document.getElementById('debugContent');
        
        // Estado
        let appConfig = null;
        let debugMode = false;
        
        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            log('App inicializado');
            loadConfig();
            
            // Verificar se está dentro de um app nativo
            checkNativeEnvironment();
        });
        
        // Carregar configuração do GitHub
        async function loadConfig() {
            try {
                log('Carregando configuração do GitHub...');
                showPlaceholder('Carregando configuração...');
                
                const response = await fetch(GITHUB_CONFIG_URL, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Cache-Control': 'no-cache'
                    },
                    mode: 'cors'
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                appConfig = await response.json();
                log('Configuração carregada:', appConfig);
                
                // Aplicar configurações
                applyConfig();
                
                // Enviar configuração para o app nativo
                sendConfigToNative();
                
            } catch (error) {
                log('Erro ao carregar configuração:', error);
                showPlaceholder('Erro ao carregar configuração');
            }
        }
        
        // Aplicar configurações no HTML
        function applyConfig() {
            if (appConfig) {
                // Carregar URL no iframe
                if (appConfig.conteudo && appConfig.conteudo.url) {
                    iframe.src = appConfig.conteudo.url;
                    log('URL carregada:', appConfig.conteudo.url);
                }
                
                // Atualizar placeholder do banner
                if (appConfig.admob && appConfig.admob.banners) {
                    const bannerAtivo = appConfig.admob.banners.find(b => b.ativo);
                    if (bannerAtivo) {
                        bannerPlaceholder.classList.add('active');
                        log('Banner ativo encontrado:', bannerAtivo);
                    }
                }
            }
        }
        
        // Enviar configuração para o app nativo
        function sendConfigToNative() {
            if (window.AndroidInterface && appConfig) {
                try {
                    const configJson = JSON.stringify(appConfig);
                    AndroidInterface.receiveConfig(configJson);
                    log('Configuração enviada para o app nativo');
                } catch (error) {
                    log('Erro ao enviar para app nativo:', error);
                }
            } else {
                log('App nativo não detectado - modo HTML puro');
                simulateNativeBanner();
            }
        }
        
        // Simular banner nativo (apenas para teste em HTML puro)
        function simulateNativeBanner() {
            setTimeout(() => {
                bannerPlaceholder.classList.add('active', 'ad-loaded');
                bannerPlaceholder.innerHTML = '<div style="background:#4CAF50; width:100%; padding:10px; text-align:center; color:white;">📱 BANNER SIMULADO (app nativo necessário)</div>';
                log('Banner simulado - instale o app nativo para anúncios reais');
            }, 2000);
        }
        
        // Verificar ambiente nativo
        function checkNativeEnvironment() {
            if (window.AndroidInterface) {
                log('✅ Ambiente nativo detectado');
                
                // Solicitar configuração atual do app nativo
                if (AndroidInterface.getConfig) {
                    const nativeConfig = AndroidInterface.getConfig();
                    if (nativeConfig) {
                        try {
                            appConfig = JSON.parse(nativeConfig);
                            applyConfig();
                        } catch (e) {
                            log('Erro ao processar config nativa');
                        }
                    }
                }
            } else {
                log('⚠️ Executando em navegador - sem SDK nativo');
            }
        }
        
        // Receber comandos do app nativo
        window.receiveFromNative = function(command, data) {
            log('Comando nativo:', command, data);
            
            switch(command) {
                case 'bannerLoaded':
                    bannerPlaceholder.classList.add('active', 'ad-loaded');
                    bannerPlaceholder.innerHTML = '';
                    break;
                    
                case 'bannerFailed':
                    showPlaceholder('Falha no anúncio');
                    break;
                    
                case 'configUpdated':
                    if (data) {
                        appConfig = JSON.parse(data);
                        applyConfig();
                    }
                    break;
            }
        };
        
        // Enviar comando para app nativo
        function sendToNative(command) {
            if (window.AndroidInterface) {
                AndroidInterface.receiveCommand(command);
                log('Comando enviado:', command);
            } else {
                if (command === 'refresh') {
                    simulateNativeBanner();
                }
                log('Comando ignorado - não está em app nativo');
            }
        }
        
        // Funções auxiliares
        function log(...args) {
            console.log('[HTML]', ...args);
            if (debugMode) {
                const timestamp = new Date().toLocaleTimeString();
                debugContent.innerHTML += `<div>${timestamp}: ${args.join(' ')}</div>`;
                debugContent.scrollTop = debugContent.scrollHeight;
            }
        }
        
        function showPlaceholder(message) {
            bannerPlaceholder.classList.add('active');
            bannerPlaceholder.innerHTML = `<span>${message}</span>`;
        }
        
        function toggleDebug() {
            debugMode = !debugMode;
            debugInfo.classList.toggle('show', debugMode);
            log('Debug mode:', debugMode);
        }
        
        // Interface para o app nativo
        window.AndroidInterface = window.AndroidInterface || {
            receiveConfig: (config) => log('Native bridge: config received'),
            receiveCommand: (cmd) => log('Native bridge: command received'),
            getConfig: () => null
        };
    </script>
</body>
</html>
