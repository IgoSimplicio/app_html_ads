<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audio Auto Cut</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f5f5f5;
        }
        
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .content {
            flex: 1;
            width: 100%;
            position: relative;
        }
        
        #mainIframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: white;
        }
        
        .banner-placeholder {
            width: 100%;
            height: 60px;
            background-color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 14px;
            border-top: 1px solid #ccc;
        }
        
        .banner-placeholder.ad-loaded {
            background-color: transparent;
            height: auto;
            min-height: 50px;
        }
        
        .control-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background-color: rgba(0,0,0,0.7);
            border-radius: 30px;
            padding: 5px;
            display: flex;
            gap: 5px;
        }
        
        .control-btn {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background-color: white;
            border: none;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .debug-info {
            position: fixed;
            bottom: 80px;
            left: 10px;
            right: 10px;
            background-color: rgba(0,0,0,0.8);
            color: #00ff00;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            z-index: 2000;
            display: none;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .debug-info.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Painel de controle -->
        <div class="control-panel" id="controlPanel">
            <button class="control-btn" onclick="sendToNative('refresh')" title="Recarregar">🔄</button>
            <button class="control-btn" onclick="toggleDebug()" title="Debug">🐞</button>
            <button class="control-btn" onclick="sendToNative('show_banner')" title="Forçar Banner">📱</button>
        </div>
        
        <!-- Conteúdo principal -->
        <div class="content" id="contentArea">
            <iframe id="mainIframe" src="https://www.google.com"></iframe>
        </div>
        
        <!-- Placeholder do banner -->
        <div class="banner-placeholder" id="bannerPlaceholder">
            <span>Aguardando anúncio do app nativo...</span>
        </div>
        
        <!-- Debug info -->
        <div class="debug-info" id="debugInfo">
            <div id="debugContent"></div>
        </div>
    </div>
    
    <script>
        // ============================================
        // CONFIGURAÇÃO - NÃO TENTA CARREGAR DO GITHUB
        // ============================================
        
        // Elementos DOM
        const iframe = document.getElementById('mainIframe');
        const bannerPlaceholder = document.getElementById('bannerPlaceholder');
        const debugInfo = document.getElementById('debugInfo');
        const debugContent = document.getElementById('debugContent');
        
        // Estado
        let debugMode = false;
        let hasNativeInterface = false;
        
        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            log('HTML inicializado');
            checkNativeInterface();
            
            // Mostrar instruções no placeholder
            updatePlaceholder('Aguardando app nativo...');
        });
        
        // Verificar se está dentro do app nativo
        function checkNativeInterface() {
            if (window.AndroidInterface) {
                hasNativeInterface = true;
                log('✅ App nativo detectado!');
                updatePlaceholder('Conectado ao app nativo');
                
                // Solicitar configuração ao app nativo
                if (window.AndroidInterface.getConfig) {
                    try {
                        const config = window.AndroidInterface.getConfig();
                        if (config) {
                            log('Config recebida do app:', config);
                        }
                    } catch (e) {
                        log('Erro ao ler config nativa');
                    }
                }
            } else {
                log('⚠️ Executando em navegador - sem app nativo');
                updatePlaceholder('Execute dentro do app nativo para ver anúncios');
            }
        }
        
        // Função chamada pelo app nativo para receber configurações
        window.receiveFromNative = function(command, data) {
            log('📱 Comando nativo:', command, data);
            
            switch(command) {
                case 'configUpdated':
                    try {
                        const config = JSON.parse(data);
                        log('Configuração atualizada:', config);
                        
                        // Atualizar URL se veio na config
                        if (config.conteudo && config.conteudo.url) {
                            iframe.src = config.conteudo.url;
                            log('URL atualizada:', config.conteudo.url);
                        }
                        
                        // Atualizar placeholder
                        updatePlaceholder('Configuração recebida');
                        
                    } catch (e) {
                        log('Erro ao processar config:', e);
                    }
                    break;
                    
                case 'bannerLoaded':
                    log('✅ Banner carregado pelo app nativo');
                    bannerPlaceholder.classList.add('ad-loaded');
                    bannerPlaceholder.innerHTML = '';
                    updatePlaceholder('Anúncio carregado!');
                    break;
                    
                case 'bannerFailed':
                    log('❌ Falha no banner nativo');
                    updatePlaceholder('Falha ao carregar anúncio');
                    break;
                    
                default:
                    log('Comando desconhecido:', command);
            }
        };
        
        // Enviar comando para o app nativo
        function sendToNative(command) {
            log('Enviando comando para app nativo:', command);
            
            if (window.AndroidInterface) {
                try {
                    if (window.AndroidInterface.receiveCommand) {
                        window.AndroidInterface.receiveCommand(command);
                    } else {
                        log('AndroidInterface.receiveCommand não disponível');
                    }
                } catch (e) {
                    log('Erro ao enviar comando:', e);
                }
            } else {
                log('⚠️ App nativo não disponível');
                updatePlaceholder('App nativo não detectado');
                
                // Simular para teste em navegador
                if (command === 'show_banner') {
                    simulateBanner();
                }
            }
        }
        
        // Simular banner para teste (apenas em navegador)
        function simulateBanner() {
            bannerPlaceholder.classList.add('ad-loaded');
            bannerPlaceholder.innerHTML = '<div style="background:#4CAF50; width:100%; padding:10px; text-align:center; color:white;">🔵 BANNER DE TESTE (modo navegador)</div>';
            log('Banner simulado - modo navegador');
        }
        
        // Atualizar texto do placeholder
        function updatePlaceholder(message) {
            if (!bannerPlaceholder.classList.contains('ad-loaded')) {
                bannerPlaceholder.innerHTML = `<span>${message}</span>`;
            }
        }
        
        // Funções de debug
        function log(...args) {
            const timestamp = new Date().toLocaleTimeString();
            const message = args.map(arg => 
                typeof arg === 'object' ? JSON.stringify(arg) : arg
            ).join(' ');
            
            console.log('[HTML]', ...args);
            
            if (debugMode) {
                debugContent.innerHTML += `<div>${timestamp}: ${message}</div>`;
                debugContent.scrollTop = debugContent.scrollHeight;
            }
        }
        
        function toggleDebug() {
            debugMode = !debugMode;
            debugInfo.classList.toggle('show', debugMode);
            log('Debug mode:', debugMode);
        }
        
        // Interface para o app nativo (exposta globalmente)
        window.AndroidInterface = window.AndroidInterface || {
            receiveCommand: (cmd) => {
                log('Comando recebido (fallback):', cmd);
                if (cmd === 'refresh') simulateBanner();
            },
            getConfig: () => null
        };
        
        // Log inicial
        log('HTML pronto - aguardando conexão com app nativo');
    </script>
</body>
</html>
