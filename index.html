<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audio Auto Cut</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f5f5f5;
        }
        
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .content {
            flex: 1;
            width: 100%;
            position: relative;
        }
        
        #mainIframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: white;
        }
        
        .status-bar {
            width: 100%;
            background-color: #2196F3;
            color: white;
            padding: 8px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
        }
        
        .banner-placeholder {
            width: 100%;
            height: 60px;
            background-color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 14px;
            border-top: 1px solid #ccc;
        }
        
        .banner-placeholder.ad-loaded {
            background-color: transparent;
            height: auto;
            min-height: 50px;
        }
        
        .control-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background-color: rgba(0,0,0,0.7);
            border-radius: 30px;
            padding: 5px;
            display: flex;
            gap: 5px;
        }
        
        .control-btn {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background-color: white;
            border: none;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .debug-info {
            position: fixed;
            bottom: 80px;
            left: 10px;
            right: 10px;
            background-color: rgba(0,0,0,0.9);
            color: #00ff00;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            z-index: 2000;
            display: none;
            max-height: 300px;
            overflow-y: auto;
            border: 2px solid #00ff00;
        }
        
        .debug-info.show {
            display: block;
        }
        
        .diagnostic-box {
            background-color: #ffeb3b;
            color: #000;
            padding: 5px;
            margin: 5px 0;
            border-radius: 3px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <!-- Barra de status -->
    <div class="status-bar" id="statusBar">
        Inicializando...
    </div>
    
    <!-- Painel de controle -->
    <div class="control-panel" id="controlPanel">
        <button class="control-btn" onclick="checkNativeInterface()" title="Verificar Conexão">🔍</button>
        <button class="control-btn" onclick="sendToNative('refresh')" title="Recarregar">🔄</button>
        <button class="control-btn" onclick="sendToNative('show_banner')" title="Forçar Banner">📱</button>
        <button class="control-btn" onclick="toggleDebug()" title="Debug">🐞</button>
    </div>
    
    <!-- Conteúdo principal -->
    <div class="content" id="contentArea">
        <iframe id="mainIframe" src="https://www.google.com"></iframe>
    </div>
    
    <!-- Placeholder do banner -->
    <div class="banner-placeholder" id="bannerPlaceholder">
        <span>Aguardando conexão...</span>
    </div>
    
    <!-- Debug info -->
    <div class="debug-info" id="debugInfo">
        <div style="color:yellow; font-weight:bold; margin-bottom:5px;">🔧 DIAGNÓSTICO</div>
        <div id="debugContent"></div>
    </div>
    
    <script>
        // Elementos DOM
        const iframe = document.getElementById('mainIframe');
        const bannerPlaceholder = document.getElementById('bannerPlaceholder');
        const debugInfo = document.getElementById('debugInfo');
        const debugContent = document.getElementById('debugContent');
        const statusBar = document.getElementById('statusBar');
        
        // Estado
        let debugMode = false;
        let checkCount = 0;
        
        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            log('🚀 HTML inicializado');
            updateStatus('Inicializando...');
            
            // Verificar interface nativa imediatamente
            setTimeout(checkNativeInterface, 500);
            setTimeout(checkNativeInterface, 1000);
            setTimeout(checkNativeInterface, 2000);
            
            // Verificar a cada 3 segundos
            setInterval(checkNativeInterface, 3000);
        });
        
        // Verificar se está dentro do app nativo
        function checkNativeInterface() {
            checkCount++;
            
            // Verificar AndroidInterface
            const hasAndroid = typeof window.AndroidInterface !== 'undefined';
            const hasReceiveCommand = hasAndroid && typeof window.AndroidInterface.receiveCommand === 'function';
            const hasGetConfig = hasAndroid && typeof window.AndroidInterface.getConfig === 'function';
            
            // Verificar se tem a interface exposta
            log(`🔍 Verificação #${checkCount}:`);
            log(`   - AndroidInterface existe: ${hasAndroid}`);
            log(`   - receiveCommand existe: ${hasReceiveCommand}`);
            log(`   - getConfig existe: ${hasGetConfig}`);
            
            if (hasAndroid) {
                updateStatus('✅ App nativo detectado!');
                updatePlaceholder('Conectado ao app nativo');
                
                // Tentar obter configuração
                if (hasGetConfig) {
                    try {
                        const config = window.AndroidInterface.getConfig();
                        log('📦 Config do app nativo:', config);
                        
                        if (config && config !== 'null') {
                            try {
                                const configObj = JSON.parse(config);
                                updateStatus('Configuração carregada');
                                
                                // Atualizar URL se disponível
                                if (configObj.conteudo && configObj.conteudo.url) {
                                    iframe.src = configObj.conteudo.url;
                                }
                            } catch (e) {
                                log('Erro ao parsear config');
                            }
                        }
                    } catch (e) {
                        log('Erro ao acessar getConfig:', e);
                    }
                }
                
                // Enviar comando de teste
                sendToNative('debug');
                
            } else {
                updateStatus('⚠️ Aguardando app nativo...');
                updatePlaceholder('Execute dentro do app nativo');
                
                // Mostrar instruções no debug
                if (checkCount === 3) {
                    log('📌 DICA: Certifique-se que:');
                    log('   1. O app foi compilado no Android Studio');
                    log('   2. webView.addJavascriptInterface() foi chamado');
                    log('   3. O WebAppInterface.java existe');
                }
            }
        }
        
        // Função chamada pelo app nativo
        window.receiveFromNative = function(command, data) {
            log('📱 Comando nativo RECEBIDO:', command, data);
            updateStatus(`Comando: ${command}`);
            
            switch(command) {
                case 'configUpdated':
                    try {
                        const config = typeof data === 'string' ? JSON.parse(data) : data;
                        log('Configuração:', config);
                        updateStatus('Config atualizada');
                        
                        if (config.conteudo && config.conteudo.url) {
                            iframe.src = config.conteudo.url;
                        }
                        
                        // Notificar app nativo que recebemos
                        sendToNative('config_received');
                        
                    } catch (e) {
                        log('Erro ao processar config:', e);
                    }
                    break;
                    
                case 'bannerLoaded':
                    log('✅ Banner carregado pelo app');
                    bannerPlaceholder.classList.add('ad-loaded');
                    bannerPlaceholder.innerHTML = '';
                    updateStatus('Anúncio carregado!');
                    break;
                    
                case 'bannerFailed':
                    log('❌ Falha no banner');
                    updatePlaceholder('Falha ao carregar anúncio');
                    updateStatus('Falha no banner');
                    break;
            }
        };
        
        // Enviar comando para app nativo
        function sendToNative(command) {
            log('📤 Enviando comando:', command);
            
            if (window.AndroidInterface && window.AndroidInterface.receiveCommand) {
                try {
                    window.AndroidInterface.receiveCommand(command);
                    log('✅ Comando enviado com sucesso');
                } catch (e) {
                    log('❌ Erro ao enviar comando:', e);
                    useFallback(command);
                }
            } else {
                log('⚠️ Interface nativa não disponível');
                useFallback(command);
            }
        }
        
        // Fallback para teste em navegador
        function useFallback(command) {
            log('🔄 Usando fallback para:', command);
            
            if (command === 'show_banner') {
                simulateBanner();
            } else if (command === 'refresh') {
                simulateRefresh();
            }
        }
        
        function simulateBanner() {
            bannerPlaceholder.classList.add('ad-loaded');
            bannerPlaceholder.innerHTML = '<div style="background:#4CAF50; width:100%; padding:15px; text-align:center; color:white; font-weight:bold;">📱 MODO DE TESTE - Banner Simulado</div>';
            updateStatus('⚠️ Modo de teste (sem app nativo)');
            log('🟢 Banner simulado ativado');
        }
        
        function simulateRefresh() {
            updateStatus('🔄 Recarregando...');
            setTimeout(() => {
                iframe.src = iframe.src;
                updateStatus('Página recarregada');
            }, 500);
        }
        
        // Atualizar barra de status
        function updateStatus(message) {
            statusBar.textContent = message;
            log('📊 Status:', message);
        }
        
        // Atualizar placeholder
        function updatePlaceholder(message) {
            if (!bannerPlaceholder.classList.contains('ad-loaded')) {
                bannerPlaceholder.innerHTML = `<span>${message}</span>`;
            }
        }
        
        // Funções de debug
        function log(...args) {
            const timestamp = new Date().toLocaleTimeString();
            const message = args.map(arg => {
                if (typeof arg === 'object') {
                    try {
                        return JSON.stringify(arg);
                    } catch {
                        return String(arg);
                    }
                }
                return String(arg);
            }).join(' ');
            
            console.log('[HTML]', ...args);
            
            if (debugMode) {
                const line = document.createElement('div');
                line.style.borderBottom = '1px solid #333';
                line.style.padding = '2px 0';
                line.textContent = `${timestamp}: ${message}`;
                debugContent.appendChild(line);
                debugContent.scrollTop = debugContent.scrollHeight;
            }
        }
        
        function toggleDebug() {
            debugMode = !debugMode;
            debugInfo.classList.toggle('show', debugMode);
            
            if (debugMode) {
                // Limpar e mostrar informações atuais
                debugContent.innerHTML = '';
                log('🔧 DEBUG ATIVADO');
                log(`📱 User Agent: ${navigator.userAgent}`);
                log(`🌐 URL atual: ${window.location.href}`);
                checkNativeInterface();
            }
        }
        
        // Expor funções globalmente
        window.checkNativeInterface = checkNativeInterface;
        window.sendToNative = sendToNative;
        window.toggleDebug = toggleDebug;
        
        // Interface fallback
        window.AndroidInterface = window.AndroidInterface || {
            receiveCommand: (cmd) => {
                log('Fallback recebeu:', cmd);
                useFallback(cmd);
            },
            getConfig: () => {
                log('Fallback getConfig chamado');
                return null;
            }
        };
        
        log('✅ HTML carregado completamente');
    </script>
</body>
</html>
